<!DOCTYPE html>
<html ng-app="app">
<head>
    <!-- ✅ FIX: use CDN (your local path may fail) -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body ng-controller="ctrl" class="container mt-4">

<h2 class="text-center">Smart Grocery Cart</h2>

<!-- SEARCH -->
<input type="text" class="form-control mb-3" placeholder="Search..." ng-model="search">

<!-- PRODUCTS -->
<div class="row">
    <div class="col-md-4" ng-repeat="p in products | filter:search">
        <div class="card p-3 mb-3">
            <h5>{{p.name}}</h5>
            <p>{{p.category}}</p>
            <p>₹{{p.price}}</p>

            <button class="btn btn-primary"
                ng-click="addToCart(p)"
                ng-disabled="p.stockAvailable == 0">
                Add to Cart
            </button>

            <span class="badge bg-danger" ng-if="p.stockAvailable == 0">Out of Stock</span>
        </div>
    </div>
</div>

<hr>

<!-- CART -->
<h3>Cart</h3>

<table class="table table-bordered">
<tr>
    <th>Name</th>
    <th>Qty</th>
    <th>Total</th>
</tr>

<tr ng-repeat="c in cart">
    <td>{{c.name}}</td>
    <td>
        <button class="btn btn-sm btn-danger" ng-click="dec(c)">-</button>
        {{c.qty}}
        <button class="btn btn-sm btn-success" ng-click="inc(c)">+</button>
    </td>
    <td>{{c.qty * c.price}}</td>
</tr>
</table>

<!-- PROMO -->
<input type="text" ng-model="promo" placeholder="Enter Code" class="form-control w-25 d-inline">
<button class="btn btn-success" ng-click="applyPromo()">Apply</button>

<hr>

<!-- BILL -->
<h4>Subtotal: ₹{{subtotal()}}</h4>
<h4>Discount: ₹{{discount}}</h4>
<h3>Final Amount: ₹{{finalAmount()}}</h3>

<script src="script.js"></script>
</body>
</html>
